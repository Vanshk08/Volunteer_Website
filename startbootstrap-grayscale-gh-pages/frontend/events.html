<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Event Hub - Find Events and Concerts" />
        <meta name="author" content="" />
        <title>Events - HiredIn</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            /* Events Page Specific Styles - Matching Landing Page Theme */
            
            /* Keep navbar black at top of events page */
            #mainNav {
                background-color: rgba(0, 0, 0, 0.9) !important;
            }
            
            #mainNav .navbar-brand {
                color: #fff !important;
            }
            
            #mainNav .nav-link {
                color: rgba(255, 255, 255, 0.7) !important;
            }
            
            #mainNav .nav-link:hover {
                color: #64a19d !important;
            }
            
            .events-header {
                position: relative;
                width: 100%;
                height: auto;
                min-height: auto;
                padding: 5rem 0;
                background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.95) 75%, #000 100%);
                text-align: center;
                margin-top: 56px;
            }

            .events-header h1 {
                font-family: "Varela Round", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-size: 2.5rem;
                line-height: 2.5rem;
                letter-spacing: 0.8rem;
                color: rgba(255, 255, 255, 0.9);
                margin-bottom: 10px;
            }

            @media (min-width: 768px) {
                .events-header h1 {
                    font-size: 4rem;
                    line-height: 4rem;
                }
            }

            @media (min-width: 992px) {
                .events-header {
                    height: auto;
                    padding: 5rem 0;
                }
                .events-header h1 {
                    font-size: 6.5rem;
                    line-height: 6.5rem;
                    letter-spacing: 0.8rem;
                }
                .events-header p {
                    max-width: 30rem;
                    font-size: 1.25rem;
                }
            }

            .events-header p {
                max-width: 20rem;
                font-size: 1rem;
                color: rgba(255, 255, 255, 0.9);
                margin-left: auto;
                margin-right: auto;
            }

            .events-container {
                padding: 2rem 0 10rem 0;
                background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.95) 75%, #000 100%);
            }

            .filter-section {
                margin-bottom: 20px;
                text-align: center;
            }

            .filter-buttons {
                display: flex;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
            }

            .filter-btn {
                padding: 10px 24px;
                border: 2px solid #64a19d;
                background: transparent;
                color: #64a19d;
                border-radius: 25px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
            }

            .filter-btn:hover {
                background: #64a19d;
                color: white;
            }

            .filter-btn.active {
                background: #64a19d;
                color: white;
            }

            .events-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 30px;
                margin-bottom: 50px;
            }

            .event-card {
                background: #1a1a1a;
                border-radius: 10px;
                overflow: hidden;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
                height: 100%;
                display: flex;
                flex-direction: column;
                border: 1px solid rgba(100, 161, 157, 0.3);
            }

            .event-card:hover {
                transform: translateY(-8px);
                box-shadow: 0 8px 25px rgba(100, 161, 157, 0.4);
                border-color: #64a19d;
            }

            .event-image {
                width: 100%;
                height: 200px;
                object-fit: cover;
            }

            .event-card-body {
                padding: 20px;
                flex-grow: 1;
                display: flex;
                flex-direction: column;
            }

            .event-date {
                color: #64a19d;
                font-weight: 700;
                font-size: 0.9rem;
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .event-title {
                font-size: 1.3rem;
                font-weight: 700;
                color: white;
                margin-bottom: 10px;
            }

            .event-location {
                color: rgba(255, 255, 255, 0.7);
                font-size: 0.95rem;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .event-details {
                display: flex;
                justify-content: space-between;
                margin-bottom: 15px;
                padding-top: 15px;
                border-top: 1px solid rgba(100, 161, 157, 0.3);
            }

            .detail-item {
                text-align: center;
                flex: 1;
            }

            .detail-label {
                font-size: 0.75rem;
                color: rgba(255, 255, 255, 0.5);
                text-transform: uppercase;
                font-weight: 600;
                margin-bottom: 3px;
            }

            .detail-value {
                font-size: 1.1rem;
                font-weight: 700;
                color: white;
            }

            .detail-value.pay {
                color: #64a19d;
            }

            .event-card-footer {
                margin-top: auto;
                padding-top: 15px;
                border-top: 1px solid rgba(100, 161, 157, 0.3);
            }

            .view-btn {
                width: 100%;
                padding: 10px;
                background: #64a19d;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
            }

            .view-btn:hover {
                background: #50817e;
            }

            /* Modal Styles */
            .modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                z-index: 1000;
                align-items: center;
                justify-content: center;
            }

            .modal-overlay.active {
                display: flex;
            }

            .modal-content {
                background: #1a1a1a;
                border-radius: 10px;
                max-width: 600px;
                max-height: 90vh;
                overflow-y: auto;
                width: 90%;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
                border: 1px solid rgba(100, 161, 157, 0.3);
            }

            .modal-header {
                position: relative;
                height: 300px;
                overflow: hidden;
            }

            .modal-header img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .modal-close-btn {
                position: absolute;
                top: 15px;
                right: 15px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                border: none;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
            }

            .modal-close-btn:hover {
                background: rgba(0, 0, 0, 0.95);
                color: #64a19d;
            }

            .modal-body {
                padding: 30px;
            }

            .modal-title {
                font-family: "Varela Round", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-size: 2rem;
                font-weight: 700;
                color: white;
                margin-bottom: 15px;
                letter-spacing: 0.05rem;
            }

            .modal-info-group {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 20px;
                font-size: 1rem;
                color: rgba(255, 255, 255, 0.7);
            }

            .modal-info-group strong {
                color: white;
            }

            .modal-description {
                color: rgba(255, 255, 255, 0.8);
                line-height: 1.7;
                margin-bottom: 25px;
                font-size: 1rem;
            }

            .modal-stats {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 25px;
                padding: 20px;
                background: rgba(100, 161, 157, 0.1);
                border-radius: 8px;
                border: 1px solid rgba(100, 161, 157, 0.3);
            }

            .modal-stat-item {
                text-align: center;
            }

            .modal-stat-label {
                font-size: 0.85rem;
                color: rgba(255, 255, 255, 0.6);
                text-transform: uppercase;
                margin-bottom: 5px;
            }

            .modal-stat-value {
                font-size: 1.5rem;
                font-weight: 700;
                color: #64a19d;
            }

            .modal-actions {
                display: flex;
                gap: 10px;
            }

            .modal-btn {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 5px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .modal-btn-primary {
                background: #64a19d;
                color: white;
            }

            .modal-btn-primary:hover {
                background: #50817e;
            }

            .modal-btn-secondary {
                background: rgba(100, 161, 157, 0.2);
                color: white;
                border: 1px solid #64a19d;
            }

            .modal-btn-secondary:hover {
                background: rgba(100, 161, 157, 0.3);
            }

            @media (max-width: 768px) {
                .events-grid {
                    grid-template-columns: 1fr;
                }

                .events-header h1 {
                    font-size: 2rem;
                }

                .modal-content {
                    width: 95%;
                }
            }
        </style>
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-transparent" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">HiredIn</a>
                <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Events Header -->
        <section class="events-header">
            <div class="container px-4 px-lg-5">
                <h1>Find Events</h1>
                <p>Discover upcoming concerts and events near you</p>
            </div>
        </section>

        <!-- Events Section -->
        <section class="events-container">
            <div class="container px-4 px-lg-5">
                <!-- Filter Section -->
                <div class="filter-section">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All Events</button>
                        <button class="filter-btn" data-filter="upcoming">Upcoming</button>
                        <button class="filter-btn" data-filter="past">Past Events</button>
                    </div>
                </div>

                <!-- Events Grid -->
                <div class="events-grid" id="eventsGrid">
                    <!-- Events will be dynamically inserted here -->
                </div>
            </div>
        </section>

        <!-- Event Detail Modal -->
        <div class="modal-overlay" id="eventModal">
            <div class="modal-content">
                <div class="modal-header">
                    <img id="modalImage" src="" alt="Event" />
                    <button class="modal-close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-info-group">
                        <i class="far fa-calendar"></i>
                        <span><strong id="modalDate"></strong></span>
                    </div>
                    <div class="modal-info-group">
                        <i class="fas fa-map-marker-alt"></i>
                        <span><strong id="modalLocation"></strong></span>
                    </div>
                    <p class="modal-description" id="modalDescription"></p>
                    <div class="modal-stats">
                        <div class="modal-stat-item">
                            <div class="modal-stat-label">Volunteers Needed</div>
                            <div class="modal-stat-value" id="modalVolunteers"></div>
                        </div>
                        <div class="modal-stat-item">
                            <div class="modal-stat-label">Pay Per Hour</div>
                            <div class="modal-stat-value" id="modalPay"></div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn modal-btn-primary" onclick="applyEvent()">Apply Now</button>
                        <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer bg-black small text-center text-white-50">
            <div class="container px-4 px-lg-5">
                <div class="mb-2">&copy; HiredIn Event Hub 2024. All rights reserved.</div>
            </div>
        </footer>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            // Sample Events Data
            const eventsData = [
                {
                    id: 1,
                    title: "Summer Music Festival 2024",
                    date: "June 15-17, 2024",
                    location: "Central Park, New York",
                    image: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=600&h=400&fit=crop",
                    volunteers: 45,
                    pay: "$18/hr",
                    description: "Join us for an epic 3-day summer music festival featuring top artists from around the world. Help us manage crowds, guide attendees, handle security checkpoints, and ensure everyone has an amazing experience. This is a fantastic opportunity to be part of a world-class event while earning great money.",
                    status: "upcoming"
                },
                {
                    id: 2,
                    title: "Jazz Night Concert",
                    date: "May 25, 2024",
                    location: "Lincoln Center, Boston",
                    image: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=600&h=400&fit=crop",
                    volunteers: 20,
                    pay: "$16/hr",
                    description: "An evening of smooth jazz featuring legendary musicians. We need enthusiastic volunteers to help with seating arrangements, concessions, and general guest support. Perfect for jazz enthusiasts!",
                    status: "upcoming"
                },
                {
                    id: 3,
                    title: "Tech Conference 2024",
                    date: "June 1-3, 2024",
                    location: "Convention Center, San Francisco",
                    image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=600&h=400&fit=crop",
                    volunteers: 80,
                    pay: "$20/hr",
                    description: "The largest tech conference of the year. We're looking for tech-savvy volunteers to help with registration, booth support, technical assistance, and crowd management. Network with industry leaders while earning competitive pay.",
                    status: "upcoming"
                },
                {
                    id: 4,
                    title: "Rock & Roll Legends Tour",
                    date: "April 10, 2024",
                    location: "Madison Square Garden, New York",
                    image: "https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=600&h=400&fit=crop",
                    volunteers: 60,
                    pay: "$19/hr",
                    description: "Experience rock history with legends performing their greatest hits. Help manage this massive concert with security, crowd control, and attendee assistance. A must for rock fans and aspiring event professionals.",
                    status: "past"
                },
                {
                    id: 5,
                    title: "Food & Wine Festival",
                    date: "May 5, 2024",
                    location: "Waterfront Park, Seattle",
                    image: "https://images.unsplash.com/photo-1555939594-58d7cb561af1?w=600&h=400&fit=crop",
                    volunteers: 35,
                    pay: "$17/hr",
                    description: "Celebrate culinary excellence with local and international chefs. Help serve food, manage tasting stations, and guide attendees through this gastronomic journey. No food experience needed—just enthusiasm!",
                    status: "upcoming"
                },
                {
                    id: 6,
                    title: "EDM Electronic Music Festival",
                    date: "March 22, 2024",
                    image: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=600&h=400&fit=crop",
                    location: "Lakeside Venue, Miami",
                    volunteers: 50,
                    pay: "$18/hr",
                    description: "Dance the night away at our massive electronic music festival. Volunteers needed for DJ support, light shows, crowd management, and vendor coordination. High-energy event with great atmosphere!",
                    status: "past"
                },
                {
                    id: 7,
                    title: "Comedy Night Special",
                    date: "May 18, 2024",
                    location: "Grand Theater, Los Angeles",
                    image: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=600&h=400&fit=crop",
                    volunteers: 15,
                    pay: "$15/hr",
                    description: "Laugh out loud with top comedians performing their best material. Help with seating, merchandise sales, and ensuring all guests have a fantastic time. Great for comedy lovers!",
                    status: "upcoming"
                },
                {
                    id: 8,
                    title: "Art Exhibition Gala",
                    date: "February 14, 2024",
                    location: "Modern Art Museum, Chicago",
                    image: "https://images.unsplash.com/photo-1495514521271-48a08b0b84ca?w=600&h=400&fit=crop",
                    volunteers: 25,
                    pay: "$17/hr",
                    description: "Experience contemporary art at this exclusive gala event. Assist with guest registration, tour guidance, and event logistics while learning about cutting-edge art.",
                    status: "past"
                }
            ];

            let currentFilter = 'all';
            let selectedEvent = null;

            // Initialize Events
            function initializeEvents() {
                renderEvents(eventsData);
                setupFilterButtons();
            }

            // Render Events based on filter
            function renderEvents(events) {
                const eventsGrid = document.getElementById('eventsGrid');
                eventsGrid.innerHTML = '';

                const filteredEvents = events.filter(event => {
                    if (currentFilter === 'all') return true;
                    return event.status === currentFilter;
                });

                if (filteredEvents.length === 0) {
                    eventsGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #6c757d; font-size: 1.1rem;">No events found.</p>';
                    return;
                }

                filteredEvents.forEach(event => {
                    const eventCard = document.createElement('div');
                    eventCard.className = 'event-card';
                    eventCard.onclick = () => openModal(event);

                    const dateObj = new Date(event.date);
                    const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                    eventCard.innerHTML = `
                        <img src="${event.image}" alt="${event.title}" class="event-image" />
                        <div class="event-card-body">
                            <div class="event-date">
                                <i class="far fa-calendar"></i>
                                ${formattedDate}
                            </div>
                            <h3 class="event-title">${event.title}</h3>
                            <div class="event-location">
                                <i class="fas fa-map-marker-alt"></i>
                                ${event.location}
                            </div>
                            <div class="event-details">
                                <div class="detail-item">
                                    <div class="detail-label">Volunteers</div>
                                    <div class="detail-value">${event.volunteers}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Pay</div>
                                    <div class="detail-value pay">${event.pay}</div>
                                </div>
                            </div>
                            <div class="event-card-footer">
                                <button class="view-btn">View Details</button>
                            </div>
                        </div>
                    `;
                    eventsGrid.appendChild(eventCard);
                });
            }

            // Setup Filter Buttons
            function setupFilterButtons() {
                const filterButtons = document.querySelectorAll('.filter-btn');
                filterButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        filterButtons.forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        currentFilter = e.target.dataset.filter;
                        renderEvents(eventsData);
                    });
                });
            }

            // Open Modal with Event Details
            function openModal(event) {
                selectedEvent = event;
                document.getElementById('modalImage').src = event.image;
                document.getElementById('modalTitle').textContent = event.title;
                document.getElementById('modalDate').textContent = event.date;
                document.getElementById('modalLocation').textContent = event.location;
                document.getElementById('modalDescription').textContent = event.description;
                document.getElementById('modalVolunteers').textContent = event.volunteers;
                document.getElementById('modalPay').textContent = event.pay;
                
                document.getElementById('eventModal').classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            // Close Modal
            function closeModal() {
                document.getElementById('eventModal').classList.remove('active');
                document.body.style.overflow = 'auto';
                selectedEvent = null;
            }

            // Apply for Event
            function applyEvent() {
                if (selectedEvent) {
                    alert(`You have applied for "${selectedEvent.title}"!\n\nOur team will contact you soon with more details.`);
                    closeModal();
                }
            }

            // Close modal when clicking outside
            document.getElementById('eventModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('eventModal')) {
                    closeModal();
                }
            });

            // Initialize on page load
            document.addEventListener('DOMContentLoaded', initializeEvents);
        </script>
    </body>
</html>
