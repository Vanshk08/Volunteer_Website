<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>My Profile - HiredIn</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
            }
            
            .profile-container {
                min-height: 100vh;
                padding: 120px 20px 50px 20px;
                position: relative;
            }
            
            .profile-wrapper {
                max-width: 900px;
                margin: 0 auto;
            }
            
            /* Cover Section */
            .profile-cover-section {
                background: linear-gradient(135deg, #64a19d 0%, #7464a1 100%);
                height: 160px;
                border-radius: 12px 12px 0 0;
                border: 1px solid rgba(100, 161, 157, 0.4);
                border-bottom: none;
                position: relative;
                overflow: visible;
            }
            
            /* Main Profile Card */
            .profile-card {
                background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
                border-radius: 0 0 12px 12px;
                border: 1px solid rgba(100, 161, 157, 0.2);
                border-top: none;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
                overflow: hidden;
            }
            
            /* Header with Photo */
            .profile-header {
                padding: 30px 40px 50px 40px;
                position: relative;
                border-bottom: 1px solid rgba(100, 161, 157, 0.1);
                background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
                z-index: 1;
            }
            
            .profile-photo-container {
                display: flex;
                align-items: flex-end;
                gap: 25px;
                margin-top: 0px;
                margin-bottom: 30px;
                position: relative;
                z-index: 2;
            }
            
            .profile-photo {
                width: 160px;
                height: 160px;
                border-radius: 50%;
                object-fit: cover;
                border: 5px solid #1a1a1a;
                background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%);
                box-shadow: 0 15px 45px rgba(100, 161, 157, 0.3);
                flex-shrink: 0;
                transition: transform 0.3s ease;
            }
            
            .profile-photo:hover {
                transform: scale(1.05);
            }
            
            #noPhotoPlaceholder {
                width: 160px;
                height: 160px;
                border-radius: 50%;
                border: 5px solid #1a1a1a;
                background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%);
                box-shadow: 0 15px 45px rgba(100, 161, 157, 0.3);
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 3.5rem;
                color: #64a19d;
            }
            
            .profile-header-info {
                flex: 1;
                padding-bottom: 10px;
            }
            
            .profile-name {
                font-size: 2.5rem;
                font-family: "Varela Round", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
                color: #ffffff;
                margin-bottom: 12px;
                font-weight: 700;
                letter-spacing: -0.5px;
            }
            
            .profile-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(100, 161, 157, 0.25);
                border: 1px solid #64a19d;
                color: #64a19d;
                padding: 8px 16px;
                border-radius: 25px;
                font-size: 0.85rem;
                font-weight: 600;
            }
            
            /* Main Content - LinkedIn Style Sections */
            .profile-content {
                padding: 40px;
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 30px;
            }
            
            .content-left {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }
            
            .content-right {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }
            
            .section-card {
                background: linear-gradient(135deg, rgba(100, 161, 157, 0.05) 0%, rgba(116, 100, 161, 0.05) 100%);
                padding: 25px;
                border-radius: 12px;
                border: 1px solid rgba(100, 161, 157, 0.15);
                transition: all 0.3s ease;
            }
            
            .section-card:hover {
                border-color: rgba(100, 161, 157, 0.3);
                background: linear-gradient(135deg, rgba(100, 161, 157, 0.1) 0%, rgba(116, 100, 161, 0.08) 100%);
            }
            
            .section-title {
                font-size: 1.2rem;
                color: #64a19d;
                margin-bottom: 20px;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .section-title::before {
                content: '';
                width: 4px;
                height: 20px;
                background: linear-gradient(180deg, #64a19d, #7464a1);
                border-radius: 2px;
            }
            
            .info-item {
                margin-bottom: 20px;
                display: flex;
                align-items: flex-start;
                gap: 15px;
            }
            
            .info-item:last-child {
                margin-bottom: 0;
            }
            
            .info-icon {
                color: #64a19d;
                font-size: 1.1rem;
                flex-shrink: 0;
                margin-top: 2px;
            }
            
            .info-content {
                flex: 1;
            }
            
            .info-label {
                font-size: 0.75rem;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 5px;
                font-weight: 700;
            }
            
            .info-value {
                font-size: 1rem;
                color: #e0e0e0;
                word-break: break-word;
                line-height: 1.5;
            }
            
            /* About Section */
            .about-section {
                grid-column: 1 / -1;
            }
            
            .about-text {
                color: #ccc;
                line-height: 1.7;
                font-size: 0.95rem;
            }
            
            /* Actions Footer */
            .profile-actions {
                padding: 25px 40px;
                display: flex;
                gap: 15px;
                justify-content: flex-end;
                border-top: 1px solid rgba(100, 161, 157, 0.1);
                flex-wrap: wrap;
                background: linear-gradient(to right, transparent, rgba(100, 161, 157, 0.05));
            }
            
            .btn-back, .btn-logout {
                border: none;
                color: white;
                padding: 10px 24px;
                font-size: 0.9rem;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-weight: 600;
            }
            
            .btn-back {
                background: linear-gradient(135deg, #64a19d, #5a8a85);
                box-shadow: 0 8px 20px rgba(100, 161, 157, 0.2);
            }
            
            .btn-back:hover {
                background: linear-gradient(135deg, #5a8a85, #4a7a75);
                transform: translateY(-2px);
                box-shadow: 0 12px 28px rgba(100, 161, 157, 0.3);
            }
            
            .btn-logout {
                background: linear-gradient(135deg, #7464a1, #6a5491);
                box-shadow: 0 8px 20px rgba(116, 100, 161, 0.2);
            }
            
            .btn-logout:hover {
                background: linear-gradient(135deg, #6a5491, #5a4481);
                transform: translateY(-2px);
                box-shadow: 0 12px 28px rgba(116, 100, 161, 0.3);
            }
            
            .no-profile {
                background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
                border: 1px solid rgba(100, 161, 157, 0.2);
                border-radius: 12px;
                text-align: center;
                padding: 80px 40px;
                color: #999;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            }
            
            .no-profile h2 {
                color: #64a19d;
                margin-bottom: 20px;
                font-size: 2rem;
                font-weight: 700;
            }
            
            /* Responsive */
            @media (max-width: 1024px) {
                .profile-content {
                    grid-template-columns: 1fr;
                }
                
                .about-section {
                    grid-column: 1;
                }
            }
            
            @media (max-width: 768px) {
                .profile-container {
                    padding: 100px 15px 50px 15px;
                }
                
                .profile-header {
                    padding: 20px 20px 30px 20px;
                }
                
                .profile-photo-container {
                    flex-direction: column;
                    align-items: center;
                    text-align: center;
                    margin-top: -50px;
                }
                
                .profile-header-info {
                    padding-bottom: 0;
                }
                
                .profile-name {
                    font-size: 2rem;
                }
                
                .profile-photo, #noPhotoPlaceholder {
                    width: 130px;
                    height: 130px;
                }
                
                .profile-content {
                    padding: 20px;
                    gap: 20px;
                }
                
                .profile-actions {
                    padding: 20px;
                    justify-content: center;
                }
                
                .btn-back, .btn-logout {
                    width: 100%;
                    justify-content: center;
                }
            }
        </style>
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light fixed-top bg-transparent" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="index.html">HiredIn</a>
                <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Profile Section -->
        <section class="profile-container">
            <div class="profile-wrapper">
                <div id="profileContent">
                    <!-- Cover Section -->
                    <div class="profile-cover-section"></div>
                    
                    <!-- Main Profile Card -->
                    <div class="profile-card">
                        <!-- Header -->
                        <div class="profile-header">
                            <div class="profile-photo-container">
                                <img id="profilePhoto" src="" alt="Profile Photo" class="profile-photo" style="display:none;">
                                <div id="noPhotoPlaceholder" class="profile-photo" style="display:flex;">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div class="profile-header-info">
                                    <h1 class="profile-name" id="profileName">-</h1>
                                    <span class="profile-badge">
                                        <i class="fas fa-check-circle"></i> Registered Volunteer
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="profile-content">
                            <!-- Left Column -->
                            <div class="content-left">
                                <!-- About Section -->
                                <div class="section-card about-section">
                                    <h3 class="section-title">About</h3>
                                    <p class="about-text" id="profileDescription">-</p>
                                </div>

                                <!-- Experience Section -->
                                <div class="section-card">
                                    <h3 class="section-title">Experience</h3>
                                    <div class="info-item">
                                        <div class="info-icon"><i class="fas fa-briefcase"></i></div>
                                        <div class="info-content">
                                            <div class="info-label">Past Experience</div>
                                            <div class="info-value" id="profileExperience">-</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Right Column -->
                            <div class="content-right">
                                <!-- Contact Info Section -->
                                <div class="section-card">
                                    <h3 class="section-title">Contact Info</h3>
                                    <div class="info-item">
                                        <div class="info-icon"><i class="fas fa-envelope"></i></div>
                                        <div class="info-content">
                                            <div class="info-label">Email</div>
                                            <div class="info-value" id="profileEmail">-</div>
                                        </div>
                                    </div>
                                    <div class="info-item">
                                        <div class="info-icon"><i class="fas fa-phone"></i></div>
                                        <div class="info-content">
                                            <div class="info-label">Phone</div>
                                            <div class="info-value" id="profileContact">-</div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Details Section -->
                                <div class="section-card">
                                    <h3 class="section-title">Details</h3>
                                    <div class="info-item">
                                        <div class="info-icon"><i class="fas fa-birthday-cake"></i></div>
                                        <div class="info-content">
                                            <div class="info-label">Age</div>
                                            <div class="info-value" id="profileAge">-</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="profile-actions">
                            <a href="index.html" class="btn-back">
                                <i class="fas fa-home"></i> Back to Home
                            </a>
                            <button class="btn-logout" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>

                <div id="noProfileContent" style="display:none;">
                    <div class="no-profile">
                        <h2><i class="fas fa-user-circle"></i> No Profile Found</h2>
                        <p>Please sign up first to view your profile.</p>
                        <a href="index.html" class="btn-back" style="margin-top: 20px;">
                            <i class="fas fa-arrow-left"></i> Go Back
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer-->
        <footer class="footer bg-black small text-center text-white-50"><div class="container px-4 px-lg-5">Copyright &copy; HiredIn Event Hub 2024</div></footer>

        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>

        <script>
            // Load profile data when page loads
            window.addEventListener('DOMContentLoaded', function() {
                const profileData = localStorage.getItem('volunteerProfile');
                
                if (!profileData) {
                    document.getElementById('profileContent').style.display = 'none';
                    document.getElementById('noProfileContent').style.display = 'block';
                    return;
                }

                try {
                    const data = JSON.parse(profileData);
                    
                    console.log('Loaded profile data:', data);
                    
                    // Fill in the profile information
                    document.getElementById('profileName').textContent = data.full_name || '-';
                    document.getElementById('profileAge').textContent = data.age || '-';
                    document.getElementById('profileEmail').textContent = data.email || '-';
                    document.getElementById('profileContact').textContent = data.contact || '-';
                    document.getElementById('profileExperience').textContent = data['past experience'] || '-';
                    document.getElementById('profileDescription').textContent = data.description || '-';
                    
                    // Load photo if available
                    if (data.photo_url) {
                        console.log('Photo URL found:', data.photo_url);
                        const photoImg = document.getElementById('profilePhoto');
                        const placeholder = document.getElementById('noPhotoPlaceholder');
                        
                        // Set the image source
                        photoImg.src = data.photo_url;
                        
                        // Handle image load success
                        photoImg.onload = function() {
                            console.log('✅ Image loaded successfully');
                            photoImg.style.display = 'block';
                            placeholder.style.display = 'none';
                        };
                        
                        // Handle image load error
                        photoImg.onerror = function() {
                            console.error('❌ Failed to load image from:', data.photo_url);
                            photoImg.style.display = 'none';
                            placeholder.style.display = 'flex';
                        };
                    } else {
                        console.log('No photo URL in profile data');
                    }
                } catch (error) {
                    console.error('Error loading profile:', error);
                    document.getElementById('profileContent').style.display = 'none';
                    document.getElementById('noProfileContent').style.display = 'block';
                }
            });

            function logout() {
                if (confirm('Are you sure you want to logout?')) {
                    localStorage.removeItem('volunteerProfile');
                    window.location.href = 'index.html';
                }
            }
        </script>
    </body>
</html>
